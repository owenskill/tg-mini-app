<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <!-- Налаштування для правильного відображення на телефонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Розіграш</title>
    
    <!-- Підключення бібліотеки Telegram Mini Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Підключення плеєра для Lottie анімацій -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

    <style>
        /* Стилі, щоб все виглядало гарно і підлаштовувалось під тему Telegram (світлу/темну) */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        #lottie-container {
            width: 250px;
            height: 250px;
            margin-bottom: 20px;
        }

        #status-text {
            font-size: 20px;
            font-weight: 600;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <!-- Тут буде крутитися анімація -->
    <div id="lottie-container"></div>
    
    <!-- Тут буде змінюватися текст -->
    <div id="status-text">Завантаження...</div>

    <script>
        // Ініціалізація Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо додаток на весь екран

        // Читаємо параметр stage з посилання, яке відправив бот
        const urlParams = new URLSearchParams(window.location.search);
        const stage = urlParams.get('stage');

        const container = document.getElementById('lottie-container');
        const textElement = document.getElementById('status-text');
        let currentAnimation = null;

        // Функція для запуску анімації
        function playAnimation(fileName, text) {
            // Якщо вже грає якась анімація - видаляємо її
            if (currentAnimation) {
                currentAnimation.destroy();
            }
            
            // Змінюємо текст
            textElement.innerText = text;
            
            // Запускаємо нову Lottie анімацію
            currentAnimation = lottie.loadAnimation({
                container: container,
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: fileName // Назва файлу
            });
        }

        // Логіка перемикання етапів
        if (stage === 'welcome') {
            // 1. Спочатку показуємо "Перевіряю підписки"
            playAnimation('searching.json', 'Перевіряю підписки...');
            
            // 2. Через 2.5 секунди (2500 мілісекунд) змінюємо на "Вітаю"
            setTimeout(() => {
                playAnimation('confetti.json', 'Вітаю! Ти береш участь у розіграші 🎊');
                tg.HapticFeedback.notificationOccurred('success'); // Вібрація успіху
            }, 2500);

        } else if (stage === 'already_in') {
            // Якщо людина вже бере участь
            playAnimation('like.json', 'Ти вже береш участь у розіграші 👍');

        } else if (stage === 'finished') {
            // Якщо розіграш закінчився
            playAnimation('indolent evening.json', 'Розіграш завершено 🏆');

        } else {
            // На випадок непередбаченої помилки
            playAnimation('searching.json', 'Щось пішло не так...');
        }
    </script>

</body>
</html>
